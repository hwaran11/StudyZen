<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Group | StudyZen</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/profile.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"  rel="stylesheet" />

    <!-- Google Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">

        <div class="logo-header">
            <span class="logo-text">StudyZen</span>
        </div>

        <header class="setup-header">
            <h1>Your Personalized Study Journey Starts Here</h1>
        </header>

        <div class="main-content">
            <section class="form-section">
                 <!-- Step Progress Bar -->
                 <div class="step-indicator">
                    <div class="step completed">
                        <div class="step-circle"><span>1</span></div>
                        <div class="step-label">Basic Info</div>
                    </div>

                    <div class="step completed">
                        <div class="step-circle"><span>2</span></div>
                        <div class="step-label">Study Partners</div>
                    </div>

                    <div class="step active">
                        <div class="step-circle">3</div>
                        <div class="step-label">Study Group</div>
                    </div>

                    <div class="step">
                        <div class="step-circle">4</div>
                        <div class="step-label">Matchability</div>
                    </div>

                    <div class="step">
                        <div class="step-circle">5</div>
                        <div class="step-label">Mindfulness</div>
                    </div>
                </div>
                <div class="form-header">
                    <h3>Study Group Preferences</h3>
                </div>

                <form id="profileForm" method="post" enctype="multipart/form-data" novalidate>
                    <div class="form-group">
                        <label for="goal">Would you like StudyZen to recommend groups for you? </label>
                        <div id="goal" class="tags-container" role="group" aria-label="Age Group">
                            <button 
                                type="button"
                                class="tag"
                                data-value="Yes">
                                Yes
                            </button>

                            <button 
                                type="button"
                                class="tag"
                                data-value="late-morning">
                                No
                            </button>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="previous" id="previous"><a href="/profile-8.html">Previous</a></button>
                        <button type="submit" id="submit"><a href="/profile-10.html">Next</a></button>
                    </div>
                </form>
            </section>
        </div>
    </main>
    <script src="/assets/js/profile.js"></script>
</body>
</html>
