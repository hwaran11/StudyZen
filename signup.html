<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | StudyZen</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/signup.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"  rel="stylesheet" />

    <!-- Google Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>

    <a href="/index.html" class="back-button">
        <i class="ri-arrow-left-line">Back to Home</i>
    </a>

    <section class="login-section">
        <div class="login-container">
            <div class="login-form">
                <h1>Create your account</h1>
                <p class="subtitle"> Fill up your university account details (UTP) to sign up</p>

                <form action="" class="form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Your email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Your password" required>
                    </div>
                    <button type="submit" class="submit-button">Signup</button>
                </form>

                <div class="or-divider">
                    <span>or</span>
                </div>

                <p class="signup-option">
                    Already have an account? <span><a href="/login.html">Log in here</a></span>
                </p>

                <div class="login-background"></div>
            </div>
        </div>
    </section>
    
</body>
</html>
