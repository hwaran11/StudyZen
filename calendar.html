<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/calendar.css">
  <link rel="stylesheet" href="/assets/css/sidebar.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <!--Font Awesome CSS -->
  <script src="https://kit.fontawesome.com/a780dab40f.js" crossorigin="anonymous"></script>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
  
  <title>Calendar</title>
</head>
<body>

    <!-- Sidebar placeholder -->
    <aside id="sidebar" class="sidebar">
        <!-- Sidebar content will be injected here -->
    </aside>

    <main class="content">
        <div class="calendar-container">
            <header class="calendar-header">
                <div class="calendar-title">March 2025</div>
                <div class="calendar-nav">
                    <button class="today-btn">Today</button>
                    <button class="nav-btn"><i class="ri-arrow-left-s-line"></i></button>
                    <button class="nav-btn"><i class="ri-arrow-right-s-line"></i></button>
                </div>
            </header>
            
            <div class="calendar-toolbar">
                <div class="view-selector">
                    <button class="view-btn active" id="view-month">Month</button>
                    <button class="view-btn" id="view-week">Week</button>
                    <button class="view-btn" id="view-day">Day</button>                    
                </div>
            </div>
            
            <div class="calendar-grid">
                <!-- Calendar content will be generated by JavaScript -->
                <!-- For month view: day headers and day cells -->
                <!-- For week view: time column and day columns with hour cells -->
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="/assets/js/calendar.js"></script>
    <script src="/assets/js/sidebar.js"></script>
</body>
</html>
