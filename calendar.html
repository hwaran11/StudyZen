<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/calendar.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <!--Font Awesome CSS -->
  <script src="https://kit.fontawesome.com/a780dab40f.js" crossorigin="anonymous"></script>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
  
  <title>Calendar</title>
</head>
<body>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-toggle" onclick="toggleSidebar()">
        </div>
    
        <div id="logo-container" class="logo-container">
            <a href="#" class="logo">StudyZen</a>
        </div>
    
        <div id="user-profile" class="user-profile">
            <div class="profile-content">
                <div class="profile-icon">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="profile-details">
                    <p class="profile-name">Alex Johnson</p>
                    <p class="profile-role"></p>
                </div>
            </div>
        </div>
    
        <nav class="sidebar-nav">
            <ul id="nav-list">
                <li>
                    <a href="#" class="nav-item" style="--item-index: 1;">
                        <i class="ri-dashboard-fill"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-item" style="--item-index: 2;">
                        <i class="ri-group-2-fill"></i>
                        <span>Study Groups</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-item" style="--item-index: 3;">
                        <i class="ri-task-fill"></i>
                        <span>Daily Planner</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-item active" style="--item-index: 4;">
                        <i class="ri-calendar-fill"></i>
                        <span>Calendar</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-item" style="--item-index: 5;">
                        <i class="ri-brain-2-fill"></i>
                        <span>Mindfulness</span>
                    </a>
                </li>
            </ul>
        </nav>
    
        <div class="sidebar-footer">
            <div class="user-status">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span class="status-text">Online</span>
                </div>
                <div class="quick-actions">
                    <button class="action-btn" data-tooltip="Notifications">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                </div>
            </div>
            <div class="footer-actions">
                <button class="footer-btn settings-btn" data-tooltip="Settings">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </button>
                <button class="footer-btn logout-btn" data-tooltip="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </button>
            </div>
            <p class="help-text">Need help? <a href="#">Contact support</a></p>
        </div>
    </aside>

    <main class="content">
        <div class="calendar-container">
            <header class="calendar-header">
                <div class="calendar-title">March 2025</div>
                <div class="calendar-nav">
                    <button class="today-btn">Today</button>
                    <button class="nav-btn"><i class="ri-arrow-left-s-line"></i></button>
                    <button class="nav-btn"><i class="ri-arrow-right-s-line"></i></button>
                </div>
            </header>
            
            <div class="calendar-toolbar">
                <div class="view-selector">
                    <button class="view-btn active" id="view-month">Month</button>
                    <button class="view-btn" id="view-week">Week</button>
                    <button class="view-btn" id="view-day">Day</button>                    
                </div>
            </div>
            
            <div class="calendar-grid">
                <!-- Calendar content will be generated by JavaScript -->
                <!-- For month view: day headers and day cells -->
                <!-- For week view: time column and day columns with hour cells -->
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="/assets/js/calendar.js"></script>
</body>
</html>
