<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindfulness | StudyZen</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/profile.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"  rel="stylesheet" />

    <!-- Google Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">

        <div class="logo-header">
            <span class="logo-text">StudyZen</span>
        </div>

        <header class="setup-header">
            <h1>Your Personalized Study Journey Starts Here</h1>
        </header>

        <div class="main-content">
            <section class="progress-section">
                <div class="progress-container">
                    <div class="step-indicator">
                        <div class="step completed" data-step="1">
                            <div class="step-circle">
                                <span class="step-number">1</span>
                            </div>
                            <div class="step-label">Basic Info</div>
                        </div>
    
                        <div class="step completed" data-step="2">
                            <div class="step-circle">
                                <span class="step-number">2</span>
                            </div>
                            <div class="step-label">Study Partner</div>
                        </div>
    
                        <div class="step completed" data-step="3">
                            <div class="step-circle">
                                <span class="step-number">3</span>
                            </div>
                            <div class="step-label">Study Group</div>
                        </div>
    
                        <div class="step completed" data-step="4">
                            <div class="step-circle">
                                <span class="step-number">4</span>
                            </div>
                            <div class="step-label">Matchability</div>
                        </div>
    
                        <div class="step active" data-step="5">
                            <div class="step-circle">
                                <span class="step-number">5</span>
                            </div>
                            <div class="step-label">Mindfulness</div>
                        </div>
                    </div>

                    <div class="progress-tracker">
                        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                            <div class="progress-fill" style="width: 99.99%;">
                            </div>
                        </div>
                        
                        <div class="progress-info">
                            <span class="progress-percentage">Step 13 of 13</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <div class="form-header">
                    <h3>Mindfulness</h3>
                </div>

                <form id="profileForm" method="post" enctype="multipart/form-data" novalidate>
                    <div class="form-group">
                        <label for="goal">Would you like reminders for mental well-being? (e.g., break reminders, mindfulness exercises)? </label>
                        <div id="goal" class="tags-container" role="group" aria-label="Age Group">
                            <button 
                                type="button"
                                class="tag"
                                data-value="Yes">
                                Yes
                            </button>

                            <button 
                                type="button"
                                class="tag"
                                data-value="No"">
                                No
                            </button>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="previous" id="previous"><a href="/profile-9.html">Previous</a></button>
                        <button type="submit" id="submit"><a href="/profile-11.html">Save</a></button>
                    </div>
                </form>
            </section>
        </div>
    </main>
    <script src="/assets/js/profile.js"></script>
</body>
</html>
