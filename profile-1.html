<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Info | StudyZen</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/profile.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"  rel="stylesheet" />

    <!-- Google Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        
         <div class="logo-header">
            <span class="logo-text">StudyZen</span>
        </div>

        <header class="setup-header">
            <h1>Your Personalized Study Journey Starts Here</h1>
        </header>

        <div class="main-content">
            <section class="progress-section">
                <div class="progress-container">
                    <div class="step-indicator">
                        <div class="step active">
                            <div class="step-circle">1</div>
                            <div class="step-label">Basic Info</div>
                        </div>

                        <div class="step">
                            <div class="step-circle">2</div>
                            <div class="step-label">Study Partners</div>
                        </div>

                        <div class="step">
                            <div class="step-circle">3</div>
                            <div class="step-label">Study Group</div>
                        </div>

                        <div class="step">
                            <div class="step-circle">4</div>
                            <div class="step-label">Matchability</div>
                        </div>

                        <div class="step">
                            <div class="step-circle">5</div>
                            <div class="step-label">Mindfulness</div>
                        </div>
                    </div>

                    <div class="progress-tracker">
                        <div class="progress-bar" role="progressbar" aria-valuenow="33" aria-valuemin="0" aria-valuemax="100">
                            <div class="progress-fill" style="width: 7.69%;">
                            </div>
                        </div>
                        <div class="progress-info">
                            <span class="progress-percentage">Step 1 of 13</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <div class="form-header">
                    <h3>About Yourself</h3>
                </div>
                <form id="profileForm" method="post" enctype="multipart/form-data" novalidate>
                    <div class="form-group">
                        <label for="full-name">What's your name?</label>
                        <input type="text" id="full-name" name="full-name" placeholder="Enter your name" required>
                    </div>
            
                    <div class="form-group">
                        <label for="age-group">What's your current age?</label>
                        <div id="age-group" class="tags-container" role="group" aria-label="Age Group">
                            <!-- Each tag is now a button for better semantics and accessibility -->
                            <button 
                                type="button" 
                                class="tag" 
                                data-value="Under 18"
                                aria-pressed="false">
                                Under 18
                            </button>

                            <button 
                                type="button" 
                                class="tag" 
                                data-value="18-25"
                                aria-pressed="false">
                                18-25
                            </button>

                            <button 
                                type="button" 
                                class="tag" 
                                data-value="26-35"
                                aria-pressed="false">
                                26-35
                            </button>

                            <button 
                                type="button" 
                                class="tag" 
                                data-value="46-55"
                                aria-pressed="false">
                                Over 35
                            </button>
                            
                            
                        </div>
                    </div>
            
                    <div class="form-group">
                        <label for="short-bio">Short Bio</label>
                        <textarea id="short-bio" name="short-bio" rows="4" placeholder="Write a short bio about yourself. Let others know what you're passionate about!"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit"><a href="/profile-2.html">Next</a></button>
                    </div>
                </form>
            </section>       
        </div>
    </main>

    <script src="/assets/js/profile.js"></script>
</body>
</html>
